syntax = "proto3";

package product;
option go_package = "github.com/lostvip-com/lv_grpc_driver_proto/product";

message Property {
  int64  id = 1;
  int64  productId = 2;
  string name = 3;
  string code = 4;
  string tag = 5;
  string accessMode = 6;
  string dataType = 7;
  string unit = 9;
  string extra = 10;
  string remark = 11;
}

message Action {
  int64  id = 1;
  int64  productId = 2;
  string code = 3;
  string tag = 4;
  string name = 5;
  string callType = 6;
  string extra = 7;
  string remark = 8;
}

message Event {
  int64  id = 1;
  int64  productId = 2;
  string eventType = 3;
  string code = 4;
  string tag = 5;
  string name = 6;
  string extra = 7;
  string remark = 8;
}

message LoadThingModelRequest {
  string traceId = 1;
  string productCode = 2;
}

message LoadThingModelResponse {
  string traceId = 1;
  string msg = 2;
  int32  code = 3;
  bool   success = 4;
  string name = 5;
  string extra = 6;
  repeated Property properties = 7;
  repeated Action   actions = 8;
  repeated Event    events = 9;
}

service RpcProduct {
  rpc LoadThingModel(LoadThingModelRequest) returns (LoadThingModelResponse) {}
}

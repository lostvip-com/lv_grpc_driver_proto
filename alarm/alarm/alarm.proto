syntax = "proto3";

package alarm;
option go_package = "github.com/lostvip-com/lv_grpc_driver_proto/alarm";

enum AlarmLevel {
  ALARM_LEVEL_UNSPECIFIED = 0;
  INFO = 1;
  WARN = 2;
  CRITICAL = 3;
  FATAL = 4;
}

message AlarmReportRequest {
  string traceId = 1;
  string deviceCode = 2;
  string gatewayCode = 3;
  string alarmId = 4;
  AlarmLevel level = 5;
  bool isRecovery = 6;
  string msg = 7;
  string threshold = 8;
  string currentValue = 9;
  string pointCode = 10;
}

message AlarmReportResponse {
  string traceId = 1;
  string msg = 2;
  int32  code = 3;
  bool   success = 4;
}

message BatchAlarmReportRequest {
  string traceId = 1;
  string gatewayCode = 2;
  string driverCode = 3;
  repeated AlarmReportRequest alarms = 4;
}

message BatchAlarmReportResponse {
  string traceId = 1;
  string msg = 2;
  int32  code = 3;
  bool   success = 4;
}

service AlarmService {
  rpc ReportAlarm(AlarmReportRequest) returns (AlarmReportResponse) {}
  rpc BatchReportAlarm(BatchAlarmReportRequest) returns (BatchAlarmReportResponse) {}
}

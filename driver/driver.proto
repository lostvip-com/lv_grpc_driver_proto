syntax = "proto3";

package driver;
option go_package = "github.com/lostvip-com/lv_grpc_driver_proto/driver";
import "google/protobuf/empty.proto";

message Pong {
  string timestamp = 1;
}

message VersionResponse {
  string version = 1;
}

message DriverRegisterRequest {
  string traceId = 1;
  int64  instanceId = 2;
  string address = 3;
  string driverType = 4;
  string iotPlatform = 5;
  string driverName = 6;
  string extra = 7;
}

message DriverRegisterResponse {
  string traceId = 1;
  string msg = 2;
  int32  code = 3;
  bool   success = 4;
  int64  instanceId = 5;
  string extra = 6;
}

message CloudInstanceResponse {
  int64  id = 1;
  string address = 2;
  string name = 3;
  string status = 4;
}

service Common {
  rpc Ping(google.protobuf.Empty) returns (Pong) {}
  rpc Version(google.protobuf.Empty) returns (VersionResponse) {}
}

service CloudInstanceService {
  rpc DriverRegister(DriverRegisterRequest) returns (DriverRegisterResponse) {}
}

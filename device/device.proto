syntax = "proto3";

package device;
option go_package = "github.com/lostvip-com/lv_grpc_driver_proto/device";

enum ConnectStatus {
  OFFLINE = 0;
  ONLINE = 1;
  INACTIVE = 2;
  DISABLE = 3;
  UNKNOWN = 4;
}

message Device {
  string traceId = 1;
  int64  id = 2;
  string name = 3;
  string productCode = 4;
  string deviceCode = 5;
  string secret = 6;
  map<string, string> extra = 7;
}


message Request {
  string traceId = 1;
  string driverName = 2;
  oneof param {
    string    deviceCode = 3;
    Device device = 4;
  }
}

message Response {
  string traceId = 1;
  string msg = 2;
  int32  code = 3;
  bool   success = 4;
  string extra = 5;
  oneof data {
    ConnectStatus status = 6;
    Device device = 7;
  }
}

service RpcDevice {
  rpc Save(Request) returns (Response) {}

  rpc Connect(Request) returns (Response) {}
  rpc Disconnect(Request) returns (Response) {}
  rpc KeepAlive(Request) returns (Response) {}

  rpc GetStatus(Request) returns (Response) {}
  rpc QueryByCode(Request) returns (Response) {}
  rpc Delete(Request) returns (Response) {}
}

syntax = "proto3";

package device;
option go_package = "github.com/lostvip-com/lv_grpc_driver_proto/device";

enum ConnectStatus {
  OFFLINE = 0;
  ONLINE = 1;
  UNACTIVE = 2;
  DISABLE = 3;
  UNKNOWN = 4;
}

message Device {
  int64  id = 1;
  string name = 2;
  string productCode = 3;
  string deviceSn = 4;
  string secret = 5;
  map<string, string> extra = 6;
}

message AddDevice {
  string name = 1;
  string productCode = 2;
  string deviceSn = 3;
  map<string, string> extra = 4;
}

message Request {
  string traceId = 1;
  string iotPlatform = 2;
  oneof param {
    string    deviceCode = 3;
    AddDevice addDevice = 4;
  }
}

message Response {
  string traceId = 1;
  string msg = 2;
  int32  code = 3;
  bool   success = 4;
  string extra = 5;
  oneof data {
    ConnectStatus status = 6;
    Device device = 7;
  }
}

service RpcDevice {
  rpc Connect(Request) returns (Response) {}
  rpc Disconnect(Request) returns (Response) {}
  rpc GetStatus(Request) returns (Response) {}
  rpc QueryByCode(Request) returns (Response) {}
  rpc Save(Request) returns (Response) {}
  rpc Delete(Request) returns (Response) {}
}
